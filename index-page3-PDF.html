<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Rapport PDF</title>
    <link rel="stylesheet" href="css/style-page3-PDF.css">
</head>
<body>

    <div class="pdf-box">
        <div class="pdf-header">
            <h1>Rapport Officiel</h1>
            <p>Généré le : <span id="pdf-date"></span></p>
        </div>

        <div class="pdf-body">
            <div class="info-group">
                <span class="label">Nom de l'utilisateur :</span>
                <span id="pdf-nom"></span>
            </div>
            <div class="info-group">
                <span class="label">Message transmis :</span>
                <span id="pdf-message"></span>
            </div>
        </div>

        <div class="pdf-footer">
            <p>Document confidentiel - Ne pas distribuer.</p>
        </div>
    </div>

    
</body>
</html>
