<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>
    <link rel="stylesheet" href="css/style-page1-Acceuil.css">
    <style>
       
        .form-container textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
            resize: vertical;
            min-height: 80px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .form-container input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
    </style>
</head>
<body> 
<canvas id="fond-etoile"></canvas>

<div class="Titre">
    <img src="images/logo.png" class="logo2">
    <i>:Cartographie en 9 points:</i>
    <img src="images/logo.png" class="logo1">
</div>

<div class="container"> 

    <div class="form-container">
        <h2>Entrez Les informations</h2>
        <input type="text" id="username" placeholder="Votre nom" required>
        
        <input id="userMessage" placeholder="Votre message" required></input>
        
        <button onclick="sauvegarderEtDiriger()">Envoyer et Voir</button>
    </div>

    <script>
        function sauvegarderEtDiriger() {
            const nom = document.getElementById('username').value.trim();
            const message = document.getElementById('userMessage').value.trim();

           
            if (nom === '' || message === '') {
                alert('Veuillez remplir tous les champs');
                return;
            }

            
            localStorage.setItem('monNom', nom);
            localStorage.setItem('monMessage', message);

            
            window.location.href = 'index-page2-Rapport.html';
        }
    </script>
</div>

<script src="JS/script-page1.js"></script>

</body>
</html>
