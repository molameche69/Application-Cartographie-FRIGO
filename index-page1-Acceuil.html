<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accueil</title>
    <link rel="stylesheet" href="css/style-page1-Acceuil.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <canvas id="fond-etoile"></canvas>

    <div class="Titre">
      <img src="images/logo.png" class="logo2" alt="Logo gauche" />
      <i>:Cartographie en 9 points:</i>
      <img src="images/logo.png" class="logo1" alt="Logo droite" />
    </div>

    <div class="systeme-onglets">
      <div class="onglets-boutons">
        <button
          class="onglet-btn actif"
          onclick="changerOnglet(event, 'onglet1')"
        >
          Fiche technique
        </button>
        <button class="onglet-btn" onclick="changerOnglet(event, 'onglet2')">
          Cartographie
        </button>
        <button class="onglet-btn" onclick="changerOnglet(event, 'onglet3')">
          Tableau température
        </button>
      </div>

      <form id="formulaire-carto" onsubmit="return false;">
        <div id="onglet1" class="contenu-onglet" style="display: block">
          <div class="tech">
            <i>Veuillez remplir les cases</i>
          </div>
          <div class="Fiche">
            <h2>1. Identification de l'équipements</h2>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Equipement"
              required
            />
            <input
              type="text"
              id="userEntreprise"
              name="userEntreprise"
              placeholder="N° de série"
              required
            />
            <input
              type="text"
              id="userService"
              name="userService"
              placeholder="Délivré à :"
              required
            />
            <input
              type="text"
              id="userReference"
              name="userReference"
              placeholder="Normes de Réf"
              required
            />
            <input
              type="text"
              id="userCaracteristique"
              name="userCaracteristique"
              placeholder="Caractéristique (marque,taille....)"
            />
            <input
              type="text"
              id="userLoc"
              name="userLoc"
              placeholder="Localisation de l'equipement"
            />

            <h2>2. Paramètres de la cartographie</h2>
            <input
              type="text"
              id="tdeconsigne"
              name="tdeconsigne"
              placeholder="Temperature ambiante (Optionnel)"
            />
            <input
              type="text"
              id="valeur"
              name="valeur"
              placeholder="Condition Désiréé (Optionnel)"
            />
            <input
              type="text"
              id="periode"
              name="periode"
              placeholder="Type de sonde"
              required
            />

            <h2>3. Mode Opératoire</h2>
            <textarea
              id="userMessage"
              name="userMessage"
              rows="4"
              style="width: 600px; resize: vertical"
              placeholder="Saisissez votre mode opératoire..."
            >
- La cartographie a été effectuée avec l'enceinte chargée
- Le début des mesures commence une fois le régime établi.
- Les points sont positionnés à 5 cm de chacune des parois.
</textarea
            >
          </div>
        </div>

        <div id="onglet2" class="contenu-onglet" style="display: none">
          <div class="Carto">
            <i>Cartographie</i>
          </div>

          <div class="container-global">
            <div class="reserve-images" id="reserve-cible">
              <h3>Sondes à placer :</h3>
              <img
                src="images/Sondes/1.png"
                class="marqueur-draggable"
                id="marqueur1"
                alt="Sonde 1"
              />
              <img
                src="images/Sondes/2.jpg"
                class="marqueur-draggable"
                id="marqueur2"
                alt="Sonde 2"
              />
              <img
                src="images/Sondes/3.jpg"
                class="marqueur-draggable"
                id="marqueur3"
                alt="Sonde 3"
              />
              <img
                src="images/Sondes/4.jpg"
                class="marqueur-draggable"
                id="marqueur4"
                alt="Sonde 4"
              />
              <img
                src="images/Sondes/5.jpg"
                class="marqueur-draggable"
                id="marqueur5"
                alt="Sonde 5"
              />
              <img
                src="images/Sondes/6.jpg"
                class="marqueur-draggable"
                id="marqueur6"
                alt="Sonde 6"
              />
              <img
                src="images/Sondes/7.jpg"
                class="marqueur-draggable"
                id="marqueur7"
                alt="Sonde 7"
              />
              <img
                src="images/Sondes/8.jpg"
                class="marqueur-draggable"
                id="marqueur8"
                alt="Sonde 8"
              />
              <img
                src="images/Sondes/9.jpg"
                class="marqueur-draggable"
                id="marqueur9"
                alt="Sonde 9"
              />

              <button type="button" onclick="reinitialiserMarqueurs()">
                Réinitialiser les marqueurs
              </button>
            </div>

            <div class="zone-carte" id="carte-cible" style="position: relative">
              <img src="images/MAP frigo.png" class="image-fond" alt="Carte" />
            </div>
          </div>
        </div>

        <div id="onglet3" class="contenu-onglet" style="display: none">
          <div id="bloc-graphique">
            <i>Analyse Thermique depuis Fichier Excel</i>

            <div
              style="
                max-width: 1000px;
                margin: 10px auto;
                background: #333;
                padding: 15px;
                border-radius: 8px;
                color: white;
                display: flex;
                gap: 20px;
                align-items: center;
                justify-content: center;
              "
            >
              <label><strong>Sélectionner la zone à analyser :</strong></label>
              <div>
                <label for="heureDebut">Début (HH:MM:SS) :</label>
                <input
                  type="text"
                  id="heureDebut"
                  placeholder="Ex: 14:40:00"
                  style="padding: 5px; border-radius: 4px; border: none; color: black;"
                />
              </div>
              <div>
                <label for="heureFin">Fin (HH:MM:SS) :</label>
                <input
                  type="text"
                  id="heureFin"
                  placeholder="Ex: 15:30:00"
                  style="padding: 5px; border-radius: 4px; border: none; color: black;"
                />
              </div>
              <button
                type="button"
                onclick="chargerFichierODS()"
                style="
                  background: grey;
                  color: white;
                  border: none;
                  padding: 6px 12px;
                  border-radius: 4px;
                  cursor: pointer;
                  font-weight: bold;
                "
              >
                Filtrer la zone
              </button>
            </div>

            <div
              style="
                max-width: 1000px;
                margin: 20px auto;
                background: white;
                padding: 10px;
                border-radius: 8px;
                height: 400px;
              "
            >
              <canvas id="graphiqueTemperatures"></canvas>
            </div>

            <div 
              style="
                max-width: 1000px; 
                margin: 20px auto; 
                background: white; 
                padding: 15px; 
                border-radius: 8px; 
                max-height: 350px; 
                overflow-y: auto;
                color: #333;
              "
            >
              <table style="width: 100%; border-collapse: collapse; text-align: left; font-family: sans-serif;">
                <thead>
                  <tr style="background-color: #f5f5f5; border-bottom: 2px solid #ddd;">
                    <th style="padding: 10px; font-weight: bold;">Identifiant Capteur</th>
                    <th style="padding: 10px; font-weight: bold;">Horodatage</th>
                    <th style="padding: 10px; font-weight: bold;">Valeur mesurée</th>
                    <th style="padding: 10px; font-weight: bold;">Unité</th>
                  </tr>
                </thead>
                <tbody id="corpsTableauODS">
                  </tbody>
              </table>
            </div>

            <button type="button" onclick="sauvegarderToutEtDiriger()">
              Envoyer et Voir le Rapport
            </button>
          </div>
        </div>
      </form>
    </div>
    <script src="JS/script-fond.js"></script>
    <script src="JS/script-page1.js"></script>
  </body>
</html>
